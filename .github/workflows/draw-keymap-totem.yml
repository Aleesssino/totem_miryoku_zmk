name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    with:
      keymap_patterns: "config/totem.keymap"
      west_config_path: "" 
      output_folder: "keymap-drawer"
      draw_args: "totem:'-k totem'"
